program: P-YYYY-NNN
name: 任务标题
status: not-started      # not-started / active / blocked / deployed

# 当前阶段（整个 Program 的执行状态）
phase: planning          # planning / in-progress / review / done

# 任务列表（由流程控制根据 Program 类型动态生成）
# 
# Implementation Program 典型任务流（Spec 模式七阶段）：
#   - Phase 2: 需求澄清
#   - Phase 3: 技术规格  
#   - Phase 4: 开发实现
#   - Phase 5: 测试验证
#   - Phase 6: 代码质量
#   - Phase 7: 功能归档
#
# Decomposition Program 典型任务流：
#   - 需求拆分
#
# 实际任务根据需求动态填充
tasks:
  - id: t1
    name: 任务描述
    status: pending      # pending / in-progress / done / blocked
  - id: t2
    name: 任务描述
    status: pending

# 产出物跟踪（由流程控制动态更新）
artifacts:
  - path: workspace/plan.md
    status: pending
    desc: 执行计划
  - path: workspace/RESULT.md
    status: pending
    desc: 完成总结